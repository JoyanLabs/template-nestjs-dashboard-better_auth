name: '🏷️ PR Scope label'

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    if: github.repository != 'JoyanLabs/template-labs-nest-fastify-biome-service'
    steps:
      - uses: actions/labeler@v6
        with:
          configuration-path: .github/pr-scope-labeler.yml
          sync-labels: true
