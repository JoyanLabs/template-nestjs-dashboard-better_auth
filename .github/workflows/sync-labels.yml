name: '🔄 Sync labels'

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.repository != 'JoyanLabs/template-labs-nest_service'
    steps:
      - uses: actions/checkout@v6
      - uses: micnncim/action-label-syncer@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
