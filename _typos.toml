[default]
extend-ignore-re = [
  "\\b[0-9A-Za-z+/]{91}(=|==)?\\b",  # base˚64 strings
  "[0-9a-fA-F]{7,}",                 # git commit hashes and mongo ids
]

[files]
extend-exclude = [
  "README.md",  # Ignore README.md to allow Spanish documentation
  "docs/",      # Ignore all docs to allow Spanish documentation
  ".github/",   # Ignore GitHub files to allow Spanish documentation
]
